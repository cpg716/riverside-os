name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight UTC
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.91"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Dependencies
        run: cargo audit

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check for Outdated Dependencies
        continue-on-error: true
        run: cargo outdated -p riverside-server --manifest-path server/Cargo.toml

  npm-audit:
    name: npm audit (${{ matrix.directory }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        directory:
          - .
          - client
          - counterpoint-bridge
          - deployment/counterpoint-bridge-gui
          - deployment/manager-app
          - deployment/server-manager-app
          - ros-dev
          - tools/counterpoint-bridge
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json
      - name: Audit npm dependency graph
        working-directory: ${{ matrix.directory }}
        run: npm audit --audit-level=high
