# Playwright against migrated Postgres + Axum serving the built SPA on :3000.
# Visual snapshot specs skip when CI=true (see client/e2e/visual-baselines.spec.ts).
name: Playwright E2E

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build server
        run: cd server && cargo build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client (SPA)
        run: cd client && npm run build

      - name: Upload Server Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/target/debug/riverside-server

      - name: Upload Frontend Bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

  e2e-blocking:
    name: Playwright Blocking Lane
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: riverside_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riverside_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:password@localhost:5432/riverside_os
      RIVERSIDE_MODE: e2e
      RIVERSIDE_HTTP_BIND: 127.0.0.1:3000
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE: http://127.0.0.1:3000
      E2E_AUTO_BOOT: "0"
      E2E_CORECARD_BASE: http://127.0.0.1:43400
      E2E_BO_STAFF_NAME: Chris G
      RIVERSIDE_ENABLE_E2E_TEST_SUPPORT: "1"
      RIVERSIDE_CORECARD_BASE_URL: http://127.0.0.1:43400
      RIVERSIDE_CORECARD_CLIENT_ID: e2e-corecard-client
      RIVERSIDE_CORECARD_CLIENT_SECRET: e2e-corecard-secret
      RIVERSIDE_CORECARD_REGION: us
      RIVERSIDE_CORECARD_ENVIRONMENT: e2e
      RIVERSIDE_CORECARD_WEBHOOK_SECRET: e2e-corecard-webhook
      FRONTEND_DIST: ./dist

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client and curl
        run: sudo apt-get update && sudo apt-get install -y postgresql-client curl

      - name: Apply SQL migrations
        run: ./scripts/apply-migrations-psql.sh

      - name: Seed E2E non-Admin staff (margin-pivot 403)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_non_admin_staff.sql

      - name: Seed RMS E2E staff permissions
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_rms_staff.sql

      - name: Seed default admin staff for E2E
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_staff_register_test.sql

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright Chromium
        run: cd client && npx playwright install chromium --with-deps

      - name: Download Server Binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary

      - name: Download Frontend Bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Fix Binary Permissions
        run: chmod +x ./riverside-server

      - name: Start fake CoreCard host
        run: |
          nohup env E2E_CORECARD_PORT=43400 \
            node scripts/fake-corecard-server.mjs > /tmp/fake-corecard.log 2>&1 &
          echo $! > /tmp/fake-corecard.pid
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:43400/__admin/calls" >/dev/null; then
              echo "Fake CoreCard host is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- fake corecard log ---"
          cat /tmp/fake-corecard.log
          exit 1

      - name: Start API server
        run: |
          nohup env DATABASE_URL="$DATABASE_URL" RIVERSIDE_HTTP_BIND=127.0.0.1:3000 \
            RIVERSIDE_MODE="$RIVERSIDE_MODE" \
            RIVERSIDE_ENABLE_E2E_TEST_SUPPORT="$RIVERSIDE_ENABLE_E2E_TEST_SUPPORT" \
            RIVERSIDE_CORECARD_BASE_URL="$RIVERSIDE_CORECARD_BASE_URL" \
            RIVERSIDE_CORECARD_CLIENT_ID="$RIVERSIDE_CORECARD_CLIENT_ID" \
            RIVERSIDE_CORECARD_CLIENT_SECRET="$RIVERSIDE_CORECARD_CLIENT_SECRET" \
            RIVERSIDE_CORECARD_REGION="$RIVERSIDE_CORECARD_REGION" \
            RIVERSIDE_CORECARD_ENVIRONMENT="$RIVERSIDE_CORECARD_ENVIRONMENT" \
            RIVERSIDE_CORECARD_WEBHOOK_SECRET="$RIVERSIDE_CORECARD_WEBHOOK_SECRET" \
            FRONTEND_DIST="$FRONTEND_DIST" \
            ./riverside-server > /tmp/ros-server.log 2>&1 &
          echo $! > /tmp/ros-server.pid
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000/api/staff/list-for-pos" | grep -q '\['; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- server log ---"
          cat /tmp/ros-server.log
          exit 1

      - name: Verify E2E test-support routes are mounted
        run: |
          status="$(curl -sS -o /tmp/e2e-test-support-body.txt -w "%{http_code}" \
            -X POST "http://127.0.0.1:3000/api/test-support/rms/seed-fixture" \
            -H "x-riverside-staff-code: 1234" \
            -H "x-riverside-staff-pin: 1234" \
            -H "Content-Type: application/json" \
            -d '{}')"
          case "$status" in
            200|400|401|403|422)
              echo "Test-support route is mounted (status $status)."
              ;;
            *)
              echo "Unexpected test-support readiness status: $status"
              echo "--- response body ---"
              cat /tmp/e2e-test-support-body.txt || true
              echo "--- server log ---"
              cat /tmp/ros-server.log || true
              exit 1
              ;;
          esac

      - name: Open default register session for contract suites
        run: |
          payload='{"cashier_code":"1234","pin":"1234","opening_float":"200.00","register_lane":1}'
          body="$(curl -sS -X POST "http://127.0.0.1:3000/api/sessions/open" \
            -H "Content-Type: application/json" \
            -d "$payload")"
          if grep -q '"session_id"' <<<"$body"; then
            echo "Default register session opened."
            exit 0
          fi
          if grep -q '"error":"register_lane_in_use"' <<<"$body"; then
            echo "Register lane 1 already open; continuing."
            exit 0
          fi
          echo "$body"
          exit 1

      - name: Run blocking core suite
        run: |
          set -o pipefail
          cd client
          npm run test:e2e:blocking 2>&1 | tee ../blocking-e2e.log

      - name: Upload blocking lane report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-blocking
          path: |
            client/test-results/
            client/playwright-report/
            /tmp/ros-server.log
            /tmp/fake-corecard.log
          if-no-files-found: ignore

      - name: Print server and fake-host logs on failure
        if: failure()
        run: |
          echo "--- /tmp/ros-server.log ---"
          cat /tmp/ros-server.log || true
          echo "--- /tmp/fake-corecard.log ---"
          cat /tmp/fake-corecard.log || true

      - name: Collect blocking failure metadata
        if: failure()
        id: blocking_failure_meta
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          category="unknown"
          hint="Review blocking-e2e.log and workflow logs for the failing step."

          if [[ -f blocking-e2e.log ]]; then
            failed_specs="$(grep -oE 'e2e/[[:alnum:]_.\/-]+\.spec\.ts' blocking-e2e.log | sort -u || true)"
            summary_lines="$(grep -E '([0-9]+ failed|Error:|Timed out|timed out|Failed)' blocking-e2e.log | tail -n 12 || true)"

            if grep -Eqi 'ECONNREFUSED|connection refused|ERR_CONNECTION_REFUSED|port[^[:alnum:]]+not[^[:alnum:]]+open|failed to connect' blocking-e2e.log; then
              category="app-startup"
              hint="API/UI startup failure likely. Check listener ports, server boot logs, and stack readiness."
            elif grep -Eqi '(^|[^0-9])(401|403)([^0-9]|$)|unauthorized|forbidden|seed[^[:alnum:]]*(fail|error)|fixture[^[:alnum:]]*(missing|not found)|missing fixture' blocking-e2e.log; then
              category="auth-seed"
              hint="Auth or seeded data failure. Re-run migrations/seeds and confirm required fixtures are present."
            elif grep -Eqi 'checkout-tender-financial-contract|tax-audit-contract|commission-audit-contract|inventory-audit-contract|register-audit-contract|register-close-reconciliation|offline-recovery-contract|qbo-audit-contract|tender-matrix-contract|tax|ledger|rounding|financial[^[:alnum:]]*contract' blocking-e2e.log; then
              category="financial-contract"
              hint="Financial contract regression. Validate tax/ledger/rounding invariants before UI triage."
            elif grep -Eqi 'locator|toBeVisible|toBeHidden|toBeInViewport|strict mode violation|not visible|viewport|outside of the viewport' blocking-e2e.log; then
              category="ui-contract"
              hint="UI contract mismatch. Review locator/visibility/viewport assertions and recent UI changes."
            elif grep -Eqi 'timeout|timed out|navigation timeout|retry|retries' blocking-e2e.log; then
              category="flaky-timing"
              hint="Timing instability likely. Inspect readiness waits, navigation timing, and retry-sensitive state."
            fi
          else
            failed_specs=""
            summary_lines="blocking-e2e.log not found; failure occurred before or outside Playwright execution."
          fi

          if [[ -z "${failed_specs}" ]]; then
            failed_specs="(failed spec names not detected from test output)"
          fi
          if [[ -z "${summary_lines}" ]]; then
            summary_lines="Blocking lane failed. Review workflow logs for details."
          fi

          {
            echo "run_url=${run_url}"
            echo "timestamp=${timestamp}"
            echo "failed_specs<<EOF"
            echo "${failed_specs}"
            echo "EOF"
            echo "failure_summary<<EOF"
            echo "${summary_lines}"
            echo "EOF"
            echo "category=${category}"
            echo "hint<<EOF"
            echo "${hint}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update blocking lane failure issue
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ steps.blocking_failure_meta.outputs.run_url }}
          FAILURE_TIMESTAMP: ${{ steps.blocking_failure_meta.outputs.timestamp }}
          FAILED_SPECS: ${{ steps.blocking_failure_meta.outputs.failed_specs }}
          FAILURE_SUMMARY: ${{ steps.blocking_failure_meta.outputs.failure_summary }}
          FAILURE_CATEGORY: ${{ steps.blocking_failure_meta.outputs.category }}
          TRIAGE_HINT: ${{ steps.blocking_failure_meta.outputs.hint }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = "E2E Blocking Lane Failure Tracker";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allowedCategories = new Set([
              "app-startup",
              "auth-seed",
              "ui-contract",
              "financial-contract",
              "flaky-timing",
            ]);
            const failedSpecsRaw = (process.env.FAILED_SPECS || "").trim();
            const summaryRaw = (process.env.FAILURE_SUMMARY || "").trim();
            const rawCategory = (process.env.FAILURE_CATEGORY || "").trim();
            const category = allowedCategories.has(rawCategory) ? rawCategory : "unknown";
            const triageHint =
              (process.env.TRIAGE_HINT || "").trim() ||
              "Review blocking lane logs and artifacts for root cause.";
            const runUrl = process.env.RUN_URL || `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const timestamp = process.env.FAILURE_TIMESTAMP || new Date().toISOString();
            const refName = context.ref.replace("refs/heads/", "");
            const shaShort = context.sha.slice(0, 7);
            const labels = ["e2e", "e2e-blocking", `e2e:${category}`];

            const labelDefinitions = {
              "e2e": { color: "1D76DB", description: "Playwright E2E tracking" },
              "e2e-blocking": { color: "B60205", description: "Blocking E2E lane failures" },
              "e2e:app-startup": { color: "D93F0B", description: "Startup or connectivity failure" },
              "e2e:auth-seed": { color: "FBCA04", description: "Auth or seed-data failure" },
              "e2e:ui-contract": { color: "5319E7", description: "UI contract assertion failure" },
              "e2e:financial-contract": { color: "0E8A16", description: "Financial contract assertion failure" },
              "e2e:flaky-timing": { color: "C2E0C6", description: "Timeout/retry/timing instability" },
              "e2e:unknown": { color: "BFD4F2", description: "Unclassified blocking lane failure" },
            };

            const failedSpecsSection = failedSpecsRaw
              ? failedSpecsRaw.split("\n").map((line) => `- ${line}`).join("\n")
              : "- (failed spec names not detected from test output)";

            const summarySection = summaryRaw || "Blocking lane failed. Review workflow logs for details.";

            const body = [
              "Automated rolling issue for blocking Playwright lane failures.",
              "",
              `Latest failure: ${timestamp}`,
              `Workflow run: ${runUrl}`,
              `Ref: \`${refName}\` @ \`${shaShort}\``,
              `Category: \`${category}\``,
              `Triage hint: ${triageHint}`,
              "",
              "Failure summary:",
              "```",
              summarySection,
              "```",
              "",
              "Failed specs (best effort):",
              failedSpecsSection,
            ].join("\n");

            const comment = [
              `Blocking lane failed at ${timestamp}.`,
              `Run: ${runUrl}`,
              `Category: \`${category}\``,
              `Hint: ${triageHint}`,
              "",
              "Failed specs (best effort):",
              failedSpecsSection,
            ].join("\n");

            async function ensureLabel(name) {
              const def = labelDefinitions[name] || labelDefinitions["e2e:unknown"];
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: def.color,
                    description: def.description,
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }

            for (const label of labels) {
              await ensureLabel(label);
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: existing.number,
                labels,
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: comment,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels,
              });
            }

      - name: Stop server
        if: always()
        run: |
          if [[ -f /tmp/ros-server.pid ]]; then
            kill "$(cat /tmp/ros-server.pid)" 2>/dev/null || true
          fi
          if [[ -f /tmp/fake-corecard.pid ]]; then
            kill "$(cat /tmp/fake-corecard.pid)" 2>/dev/null || true
          fi

  e2e-nightly:
    name: Playwright Nightly Lane
    if: github.event_name == 'schedule'
    continue-on-error: true
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: riverside_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riverside_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:password@localhost:5432/riverside_os
      RIVERSIDE_MODE: e2e
      RIVERSIDE_HTTP_BIND: 127.0.0.1:3000
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE: http://127.0.0.1:3000
      E2E_AUTO_BOOT: "0"
      E2E_CORECARD_BASE: http://127.0.0.1:43400
      E2E_BO_STAFF_NAME: Chris G
      RIVERSIDE_ENABLE_E2E_TEST_SUPPORT: "1"
      RIVERSIDE_CORECARD_BASE_URL: http://127.0.0.1:43400
      RIVERSIDE_CORECARD_CLIENT_ID: e2e-corecard-client
      RIVERSIDE_CORECARD_CLIENT_SECRET: e2e-corecard-secret
      RIVERSIDE_CORECARD_REGION: us
      RIVERSIDE_CORECARD_ENVIRONMENT: e2e
      RIVERSIDE_CORECARD_WEBHOOK_SECRET: e2e-corecard-webhook
      FRONTEND_DIST: ./dist

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client and curl
        run: sudo apt-get update && sudo apt-get install -y postgresql-client curl

      - name: Apply SQL migrations
        run: ./scripts/apply-migrations-psql.sh

      - name: Seed E2E non-Admin staff (margin-pivot 403)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_non_admin_staff.sql

      - name: Seed RMS E2E staff permissions
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_rms_staff.sql

      - name: Seed default admin staff for E2E
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_staff_register_test.sql

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright Chromium
        run: cd client && npx playwright install chromium --with-deps

      - name: Download Server Binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary

      - name: Download Frontend Bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Fix Binary Permissions
        run: chmod +x ./riverside-server

      - name: Start fake CoreCard host
        run: |
          nohup env E2E_CORECARD_PORT=43400 \
            node scripts/fake-corecard-server.mjs > /tmp/fake-corecard.log 2>&1 &
          echo $! > /tmp/fake-corecard.pid
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:43400/__admin/calls" >/dev/null; then
              echo "Fake CoreCard host is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- fake corecard log ---"
          cat /tmp/fake-corecard.log
          exit 1

      - name: Start API server
        run: |
          nohup env DATABASE_URL="$DATABASE_URL" RIVERSIDE_HTTP_BIND=127.0.0.1:3000 \
            RIVERSIDE_MODE="$RIVERSIDE_MODE" \
            RIVERSIDE_ENABLE_E2E_TEST_SUPPORT="$RIVERSIDE_ENABLE_E2E_TEST_SUPPORT" \
            RIVERSIDE_CORECARD_BASE_URL="$RIVERSIDE_CORECARD_BASE_URL" \
            RIVERSIDE_CORECARD_CLIENT_ID="$RIVERSIDE_CORECARD_CLIENT_ID" \
            RIVERSIDE_CORECARD_CLIENT_SECRET="$RIVERSIDE_CORECARD_CLIENT_SECRET" \
            RIVERSIDE_CORECARD_REGION="$RIVERSIDE_CORECARD_REGION" \
            RIVERSIDE_CORECARD_ENVIRONMENT="$RIVERSIDE_CORECARD_ENVIRONMENT" \
            RIVERSIDE_CORECARD_WEBHOOK_SECRET="$RIVERSIDE_CORECARD_WEBHOOK_SECRET" \
            FRONTEND_DIST="$FRONTEND_DIST" \
            ./riverside-server > /tmp/ros-server.log 2>&1 &
          echo $! > /tmp/ros-server.pid
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000/api/staff/list-for-pos" | grep -q '\['; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- server log ---"
          cat /tmp/ros-server.log
          exit 1

      - name: Verify E2E test-support routes are mounted
        run: |
          status="$(curl -sS -o /tmp/e2e-test-support-body.txt -w "%{http_code}" \
            -X POST "http://127.0.0.1:3000/api/test-support/rms/seed-fixture" \
            -H "x-riverside-staff-code: 1234" \
            -H "x-riverside-staff-pin: 1234" \
            -H "Content-Type: application/json" \
            -d '{}')"
          case "$status" in
            200|400|401|403|422)
              echo "Test-support route is mounted (status $status)."
              ;;
            *)
              echo "Unexpected test-support readiness status: $status"
              echo "--- response body ---"
              cat /tmp/e2e-test-support-body.txt || true
              echo "--- server log ---"
              cat /tmp/ros-server.log || true
              exit 1
              ;;
          esac

      - name: Open default register session for contract suites
        run: |
          payload='{"cashier_code":"1234","pin":"1234","opening_float":"200.00","register_lane":1}'
          body="$(curl -sS -X POST "http://127.0.0.1:3000/api/sessions/open" \
            -H "Content-Type: application/json" \
            -d "$payload")"
          if grep -q '"session_id"' <<<"$body"; then
            echo "Default register session opened."
            exit 0
          fi
          if grep -q '"error":"register_lane_in_use"' <<<"$body"; then
            echo "Register lane 1 already open; continuing."
            exit 0
          fi
          echo "$body"
          exit 1

      - name: Run nightly full suite
        run: cd client && npm run test:e2e:nightly

      - name: Upload nightly lane report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: |
            client/test-results/
            client/playwright-report/
            /tmp/ros-server.log
            /tmp/fake-corecard.log
          if-no-files-found: ignore

      - name: Print server and fake-host logs on failure
        if: failure()
        run: |
          echo "--- /tmp/ros-server.log ---"
          cat /tmp/ros-server.log || true
          echo "--- /tmp/fake-corecard.log ---"
          cat /tmp/fake-corecard.log || true

      - name: Stop server
        if: always()
        run: |
          if [[ -f /tmp/ros-server.pid ]]; then
            kill "$(cat /tmp/ros-server.pid)" 2>/dev/null || true
          fi
          if [[ -f /tmp/fake-corecard.pid ]]; then
            kill "$(cat /tmp/fake-corecard.pid)" 2>/dev/null || true
          fi
