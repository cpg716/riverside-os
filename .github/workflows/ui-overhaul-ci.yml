name: UI Overhaul CI
on:
  pull_request:
    branches:
      - fix/restore-ui
      - feat/ui-overhaul
      - feat/ui-overhaul-step2
      - feat/ui-overhaul-step3
      - feat/ui-overhaul-step3

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Lint client
        run: npm run lint
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client
      - name: Run UI Overhaul QA gating
        run: node ./scripts/qa-ui-overhaul.js
        working-directory: client

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          profile: minimal
      - name: Backend fmt & check
        run: |
          cd server
          cargo fmt --all
          cargo check
          cargo test || true
