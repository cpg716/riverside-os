name: Help Center Automation

on:
  workflow_dispatch:
    inputs:
      create_pull_request:
        description: "Open/update a PR if Help assets changed"
        required: false
        default: "true"
      reindex_search:
        description: "Request Help search reindex after refresh"
        required: false
        default: "false"
  schedule:
    - cron: "30 9 * * *"

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  refresh-help-center:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: riverside_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riverside_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:password@localhost:5432/riverside_os
      RIVERSIDE_HTTP_BIND: 127.0.0.1:3000
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE: http://127.0.0.1:3000
      E2E_AUTO_BOOT: "0"
      E2E_BO_STAFF_CODE: "1234"
      E2E_BO_STAFF_PIN: "1234"
      E2E_BO_STAFF_NAME: Chris G
      RIVERSIDE_ENABLE_E2E_TEST_SUPPORT: "1"
      E2E_CORECARD_BASE: http://127.0.0.1:43400
      RIVERSIDE_CORECARD_BASE_URL: http://127.0.0.1:43400
      RIVERSIDE_CORECARD_CLIENT_ID: e2e-corecard-client
      RIVERSIDE_CORECARD_CLIENT_SECRET: e2e-corecard-secret
      RIVERSIDE_CORECARD_REGION: us
      RIVERSIDE_CORECARD_ENVIRONMENT: e2e
      RIVERSIDE_CORECARD_WEBHOOK_SECRET: e2e-corecard-webhook

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client and curl
        run: sudo apt-get update && sudo apt-get install -y postgresql-client curl

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Apply SQL migrations
        run: ./scripts/apply-migrations-psql.sh

      - name: Seed E2E staff
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_staff_register_test.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_non_admin_staff.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed_e2e_rms_staff.sql

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build server
        run: cd server && cargo build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install Playwright Chromium
        run: cd client && npx playwright install chromium --with-deps

      - name: Run AIDocs environment check
        run: npm run help:aidocs:check

      - name: Build client (for Axum static fallback)
        run: cd client && npm run build

      - name: Start fake CoreCard host
        run: |
          nohup env E2E_CORECARD_PORT=43400 \
            node scripts/fake-corecard-server.mjs > /tmp/fake-corecard.log 2>&1 &
          echo $! > /tmp/fake-corecard.pid
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:43400/__admin/calls" >/dev/null; then
              echo "Fake CoreCard host is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- fake corecard log ---"
          cat /tmp/fake-corecard.log
          exit 1

      - name: Start API server
        run: |
          cd server
          nohup env DATABASE_URL="$DATABASE_URL" RIVERSIDE_HTTP_BIND=127.0.0.1:3000 \
            RIVERSIDE_ENABLE_E2E_TEST_SUPPORT="$RIVERSIDE_ENABLE_E2E_TEST_SUPPORT" \
            RIVERSIDE_CORECARD_BASE_URL="$RIVERSIDE_CORECARD_BASE_URL" \
            RIVERSIDE_CORECARD_CLIENT_ID="$RIVERSIDE_CORECARD_CLIENT_ID" \
            RIVERSIDE_CORECARD_CLIENT_SECRET="$RIVERSIDE_CORECARD_CLIENT_SECRET" \
            RIVERSIDE_CORECARD_REGION="$RIVERSIDE_CORECARD_REGION" \
            RIVERSIDE_CORECARD_ENVIRONMENT="$RIVERSIDE_CORECARD_ENVIRONMENT" \
            RIVERSIDE_CORECARD_WEBHOOK_SECRET="$RIVERSIDE_CORECARD_WEBHOOK_SECRET" \
            ./target/debug/riverside-server > /tmp/ros-server.log 2>&1 &
          echo $! > /tmp/ros-server.pid
          for i in $(seq 1 90); do
            if curl -sf "http://127.0.0.1:3000/api/staff/list-for-pos" | grep -q '\['; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "--- server log ---"
          cat /tmp/ros-server.log
          exit 1

      - name: Refresh Help Center assets
        env:
          REINDEX_SEARCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reindex_search || 'false' }}
        run: |
          args=(--no-auto-boot)
          if [[ "$REINDEX_SEARCH" == "true" ]]; then
            args+=(--reindex-search)
          fi
          npm run generate:help:refresh -- "${args[@]}"

      - name: Upload generated Help artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: help-center-automation-output
          path: |
            client/src/assets/images/help/
            client/src/assets/docs/help-quality-report.generated.json
            client/src/lib/help/help-manifest.generated.ts
            server/src/logic/help_corpus_manuals.generated.rs
            /tmp/ros-server.log
            /tmp/fake-corecard.log
          if-no-files-found: ignore

      - name: Create Pull Request for Help updates
        if: ${{ github.event_name == 'schedule' || github.event.inputs.create_pull_request == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs(help): refresh Help Center assets"
          title: "docs(help): refresh Help Center assets"
          body: |
            Automated Help Center refresh.

            Included:
            - deterministic Playwright screenshot updates
            - Help manifest regeneration
            - Help corpus regeneration
          branch: codex/help-center-automation
          delete-branch: true

      - name: Stop server
        if: always()
        run: |
          if [[ -f /tmp/ros-server.pid ]]; then
            kill "$(cat /tmp/ros-server.pid)" 2>/dev/null || true
          fi
          if [[ -f /tmp/fake-corecard.pid ]]; then
            kill "$(cat /tmp/fake-corecard.pid)" 2>/dev/null || true
          fi
