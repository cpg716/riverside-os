name: Windows deployment package

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      package_scope:
        description: "What to publish"
        required: true
        type: choice
        default: "full-deployment"
        options:
          - "full-deployment"
          - "main-hub-update"
          - "app-updater-only"
      release_tag:
        description: "Release tag to update; blank uses package version"
        required: false
        default: ""
      release_notes:
        description: "Release notes shown in updater prompts"
        required: false
        default: "Riverside POS update"

permissions:
  contents: write
  actions: read

env:
  CARGO_INCREMENTAL: "0"
  RIVERSIDE_BUILD_SHA: ${{ github.sha }}
  RIVERSIDE_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
  RIVERSIDE_DEPLOYMENT_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-deployment-manager.json
  RIVERSIDE_SERVER_MANAGER_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-server-manager.json
  RIVERSIDE_COUNTERSYNC_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-countersync-bridge-gui.json
  RIVERSIDE_UPDATER_PUBLIC_KEY: ${{ vars.RIVERSIDE_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  RIVERSIDE_UPDATER_BASE_URL: https://github.com/${{ github.repository }}/releases/latest/download
  RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
  RELEASE_TAG_OVERRIDE: ${{ github.event.inputs.release_tag }}
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GHA_ENABLED: "true"
  LLAMA_CPP_RELEASE: b8994
  LLAMA_CPP_WIN_CPU_ASSET: llama-b8994-bin-win-cpu-x64.zip

jobs:
  validate-scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate deployment PowerShell scripts
        shell: pwsh
        run: |
          $hasErrors = $false
          Get-ChildItem -Path "deployment/windows" -Filter "*.ps1" | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $hasErrors = $true
              foreach ($parseError in $parseErrors) {
                Write-Host "::error file=$($_.FullName),line=$($parseError.Extent.StartLineNumber),col=$($parseError.Extent.StartColumnNumber)::$($parseError.Message)"
              }
            }
          }
          if ($hasErrors) {
            throw "Deployment PowerShell parse validation failed."
          }

      - name: Validate deployment release gates
        run: npm run check:deployment-release

      - name: Validate go-live blocker gates
        run: node scripts/check-go-live-blockers.mjs

  pre-retag-gate:
    name: Pre-retag release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-pre-retag"

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Run pre-retag gate
        run: npm run check:pre-retag

  require-playwright-green:
    name: Require Playwright E2E green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Wait for same-commit Playwright E2E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/require-playwright-success.mjs --sha "${{ github.sha }}"

  build-register-updater:
    needs: [validate-scripts, pre-retag-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache client node_modules
        id: cache-client-node-modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: windows-client-npm-${{ hashFiles('client/package-lock.json') }}
          restore-keys: windows-client-npm-

      - name: Install client dependencies
        if: steps.cache-client-node-modules.outputs.cache-hit != 'true'
        working-directory: client
        run: npm ci

      - name: Check Riverside version parity
        run: node scripts/check-version-parity.mjs

      - name: Install Windows ROSIE sidecar
        shell: pwsh
        working-directory: client
        run: |
          $archive = Join-Path $env:RUNNER_TEMP $env:LLAMA_CPP_WIN_CPU_ASSET
          $extractDir = Join-Path $env:RUNNER_TEMP "llama-cpp-win"
          $downloadUrl = "https://github.com/ggml-org/llama.cpp/releases/download/$env:LLAMA_CPP_RELEASE/$env:LLAMA_CPP_WIN_CPU_ASSET"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
          $binaryDir = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $binaryDir | Out-Null
          Copy-Item -Path (Join-Path $extractDir "llama-server.exe") -Destination "$binaryDir/llama-server-x86_64-pc-windows-msvc.exe" -Force
          Copy-Item -Path (Join-Path $extractDir "*.dll") -Destination $binaryDir -Force

      - name: Smoke ROSIE sidecar package wiring
        shell: pwsh
        env:
          RIVERSIDE_LLAMA_HOST: 127.0.0.1
          RIVERSIDE_LLAMA_PORT: 18080
          RIVERSIDE_LLAMA_EXTRA_ARGS: --reasoning off
          RIVERSIDE_LLAMA_MODEL_PATH: ${{ runner.temp }}\missing-rosie-model.gguf
        run: ./scripts/smoke-rosie-sidecar-package.ps1 -AllowMissingModel

      - name: Cache WiX Toolset
        id: cache-wix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wix314
          key: wix314-binaries-v1

      - name: Setup WiX Toolset
        if: steps.cache-wix.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixZip = Join-Path $env:RUNNER_TEMP "wix314.zip"
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $maxRetries = 5
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Host "Downloading WiX Toolset (Attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $wixZip -TimeoutSec 60
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Download failed: $_. Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw $_
              }
            }
          }
          Write-Host "Extracting WiX Toolset..."
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force

      - name: Set WiX Path
        shell: pwsh
        run: |
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          echo "TAURI_WIX_DIR=$wixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signed register updater bundle
        shell: pwsh
        working-directory: client
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_ENDPOINT)) {
            throw "RIVERSIDE_UPDATER_ENDPOINT is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_PUBLIC_KEY)) {
            throw "RIVERSIDE_UPDATER_PUBLIC_KEY is required"
          }
          $updaterConfig = @{
            bundle = @{
              createUpdaterArtifacts = $true
              useLocalToolsDir = $true
              resources = @("../dist", "binaries/*.dll")
            }
            plugins = @{
              updater = @{
                active = $true
                endpoints = @($env:RIVERSIDE_UPDATER_ENDPOINT)
                pubkey = $env:RIVERSIDE_UPDATER_PUBLIC_KEY
                windows = @{
                  installMode = "passive"
                }
              }
            }
          } | ConvertTo-Json -Depth 8
          Set-Content -Path "src-tauri/tauri.updater.conf.json" -Value $updaterConfig -NoNewline
          ../scripts/invoke-tauri-build-with-retry.ps1 -Arguments @("build", "--config", "src-tauri/tauri.updater.conf.json")

      - name: Prepare updater files
        shell: pwsh
        working-directory: client
        run: |
          $targetRoot = "../target"
          $sig = Get-ChildItem -Path $targetRoot -Recurse -Filter *.sig | Select-Object -First 1
          if ($null -eq $sig) {
            throw "No updater signature file (*.sig) found. Ensure TAURI_SIGNING_PRIVATE_KEY is configured."
          }
          $artifactPath = [System.IO.Path]::GetFullPath(($sig.FullName.Substring(0, $sig.FullName.Length - 4)))
          if (-not (Test-Path $artifactPath)) {
            throw "Could not find updater artifact paired with signature: $artifactPath"
          }
          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $version = $pkg.version
          $gitShort = $env:GITHUB_SHA.Substring(0, 8)
          $updaterVersion = "$version+$gitShort"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $artifactName = [System.IO.Path]::GetFileName($artifactPath)
          $releaseAssetName = $artifactName -replace ' ', '.'
          $releaseSignatureName = "$releaseAssetName.sig"
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $notes = if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) { "Riverside POS update" } else { $env:RELEASE_NOTES }
          $manifest = @{
            version = $updaterVersion
            notes = $notes
            pub_date = $pubDate
            build_sha = $env:GITHUB_SHA
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "$($env:RIVERSIDE_UPDATER_BASE_URL.TrimEnd('/'))/$releaseAssetName"
              }
            }
          } | ConvertTo-Json -Depth 6
          New-Item -ItemType Directory -Force -Path updater-dist | Out-Null
          Copy-Item -Path $artifactPath -Destination "updater-dist/$releaseAssetName" -Force
          Copy-Item -Path $sig.FullName -Destination "updater-dist/$releaseSignatureName" -Force
          Set-Content -Path "updater-dist/latest.json" -Value $manifest -NoNewline
          @{
            version = $version
            updaterVersion = $updaterVersion
            sourceGitSha = $env:GITHUB_SHA
            sourceGitShort = $gitShort
            asset = $releaseAssetName
            signatureAsset = $releaseSignatureName
            builtAt = $pubDate
          } | ConvertTo-Json -Depth 4 | Set-Content -Path "updater-dist/riverside-updater-build-manifest.json" -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - uses: actions/upload-artifact@v4
        with:
          name: llama-binaries
          path: client/src-tauri/binaries/

      - uses: actions/upload-artifact@v4
        with:
          name: register-bundle
          path: target/release/bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: updater-dist
          path: client/updater-dist/

  publish-app-updater-only:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.package_scope == 'app-updater-only' }}
    needs: [build-register-updater, require-playwright-green]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Download updater dist
        uses: actions/download-artifact@v4
        with:
          name: updater-dist
          path: client/updater-dist

      - name: Publish app updater assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content "client/package.json" | ConvertFrom-Json).version
          $tag = if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG_OVERRIDE)) { "v$version" } else { $env:RELEASE_TAG_OVERRIDE }
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Riverside POS $tag" --notes "Riverside POS Release"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag"
            }
          }
          if (-not (Test-Path "client/updater-dist/latest.json")) {
            throw "App updater manifest latest.json was not produced."
          }
          if (-not (Test-Path "client/updater-dist/riverside-updater-build-manifest.json")) {
            throw "App updater build manifest was not produced."
          }
          gh release upload $tag client/updater-dist/* --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload app updater assets to release $tag"
          }
          node scripts/verify-updater-release-assets.mjs `
            --repo $env:GITHUB_REPOSITORY `
            --tag $tag `
            --platform windows-x86_64 `
            --manifest latest.json `
            --build-manifest riverside-updater-build-manifest.json

  build-server-binary:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.package_scope != 'app-updater-only' }}
    needs: [validate-scripts, pre-retag-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build Windows server binary
        shell: pwsh
        run: cargo build --release --manifest-path server/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: target/release/riverside-server.exe

  build-deployment-manager:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.package_scope == 'full-deployment' }}
    needs: [validate-scripts, pre-retag-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deployment/manager-app/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache manager-app node_modules
        id: cache-manager-node-modules
        uses: actions/cache@v4
        with:
          path: deployment/manager-app/node_modules
          key: windows-manager-npm-${{ hashFiles('deployment/manager-app/package-lock.json') }}
          restore-keys: windows-manager-npm-

      - name: Install manager-app dependencies
        if: steps.cache-manager-node-modules.outputs.cache-hit != 'true'
        working-directory: deployment/manager-app
        run: npm ci

      - name: Cache WiX Toolset
        id: cache-wix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wix314
          key: wix314-binaries-v1

      - name: Setup WiX Toolset
        if: steps.cache-wix.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixZip = Join-Path $env:RUNNER_TEMP "wix314.zip"
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $maxRetries = 5
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Host "Downloading WiX Toolset (Attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $wixZip -TimeoutSec 60
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Download failed: $_. Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw $_
              }
            }
          }
          Write-Host "Extracting WiX Toolset..."
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force

      - name: Set WiX Path
        shell: pwsh
        run: |
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          echo "TAURI_WIX_DIR=$wixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Deployment Manager binary
        shell: pwsh
        run: |
          cd deployment/manager-app
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_DEPLOYMENT_UPDATER_ENDPOINT)) {
            throw "RIVERSIDE_DEPLOYMENT_UPDATER_ENDPOINT is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_PUBLIC_KEY)) {
            throw "RIVERSIDE_UPDATER_PUBLIC_KEY is required"
          }
          $updaterConfig = @{
            bundle = @{
              createUpdaterArtifacts = $true
              useLocalToolsDir = $true
            }
            plugins = @{
              updater = @{
                active = $true
                endpoints = @($env:RIVERSIDE_DEPLOYMENT_UPDATER_ENDPOINT)
                pubkey = $env:RIVERSIDE_UPDATER_PUBLIC_KEY
                windows = @{
                  installMode = "passive"
                }
              }
            }
          } | ConvertTo-Json -Depth 8
          Set-Content -Path "src-tauri/tauri.updater.conf.json" -Value $updaterConfig -NoNewline
          ../../scripts/invoke-tauri-build-with-retry.ps1 -Arguments @("build", "--config", "src-tauri/tauri.updater.conf.json")
          cd ../..
          ./scripts/prepare-tauri-updater-dist.ps1 `
            -PackageJsonPath ".\deployment\manager-app\package.json" `
            -TargetRoot ".\target" `
            -OutputDir ".\deployment\manager-app\updater-dist" `
            -ManifestName "latest-deployment-manager.json" `
            -BuildManifestName "riverside-deployment-manager-updater-build-manifest.json" `
            -BaseUrl $env:RIVERSIDE_UPDATER_BASE_URL `
            -Notes "Riverside Deployment Manager update" `
            -PlatformKey "windows-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-manager-binary
          path: target/release/riverside-deployment-manager.exe

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-manager-bundle
          path: target/release/bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-manager-updater-dist
          path: deployment/manager-app/updater-dist/

  build-server-manager:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.package_scope == 'full-deployment' }}
    needs: [validate-scripts, pre-retag-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deployment/server-manager-app/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache server-manager-app node_modules
        id: cache-server-manager-node-modules
        uses: actions/cache@v4
        with:
          path: deployment/server-manager-app/node_modules
          key: windows-server-manager-npm-${{ hashFiles('deployment/server-manager-app/package-lock.json') }}
          restore-keys: windows-server-manager-npm-

      - name: Install server-manager-app dependencies
        if: steps.cache-server-manager-node-modules.outputs.cache-hit != 'true'
        working-directory: deployment/server-manager-app
        run: npm ci

      - name: Cache WiX Toolset
        id: cache-wix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wix314
          key: wix314-binaries-v1

      - name: Setup WiX Toolset
        if: steps.cache-wix.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixZip = Join-Path $env:RUNNER_TEMP "wix314.zip"
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $maxRetries = 5
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Host "Downloading WiX Toolset (Attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $wixZip -TimeoutSec 60
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Download failed: $_. Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw $_
              }
            }
          }
          Write-Host "Extracting WiX Toolset..."
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force

      - name: Set WiX Path
        shell: pwsh
        run: |
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          echo "TAURI_WIX_DIR=$wixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build ROS Server Manager binary
        shell: pwsh
        run: |
          cd deployment/server-manager-app
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_SERVER_MANAGER_UPDATER_ENDPOINT)) {
            throw "RIVERSIDE_SERVER_MANAGER_UPDATER_ENDPOINT is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_PUBLIC_KEY)) {
            throw "RIVERSIDE_UPDATER_PUBLIC_KEY is required"
          }
          $updaterConfig = @{
            bundle = @{
              createUpdaterArtifacts = $true
              useLocalToolsDir = $true
            }
            plugins = @{
              updater = @{
                active = $true
                endpoints = @($env:RIVERSIDE_SERVER_MANAGER_UPDATER_ENDPOINT)
                pubkey = $env:RIVERSIDE_UPDATER_PUBLIC_KEY
                windows = @{
                  installMode = "passive"
                }
              }
            }
          } | ConvertTo-Json -Depth 8
          Set-Content -Path "src-tauri/tauri.updater.conf.json" -Value $updaterConfig -NoNewline
          ../../scripts/invoke-tauri-build-with-retry.ps1 -Arguments @("build", "--config", "src-tauri/tauri.updater.conf.json")
          $src = "src-tauri\target\release\ros-server-manager.exe"
          $dst = "..\..\target\release\ros-server-manager.exe"
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
            Copy-Item -Path $src -Destination $dst -Force
          } else {
            throw "ros-server-manager.exe not found at $src"
          }
          cd ../..
          ./scripts/prepare-tauri-updater-dist.ps1 `
            -PackageJsonPath ".\deployment\server-manager-app\package.json" `
            -TargetRoot ".\deployment\server-manager-app\src-tauri\target" `
            -OutputDir ".\deployment\server-manager-app\updater-dist" `
            -ManifestName "latest-server-manager.json" `
            -BuildManifestName "ros-server-manager-updater-build-manifest.json" `
            -BaseUrl $env:RIVERSIDE_UPDATER_BASE_URL `
            -Notes "ROS Server Manager update" `
            -PlatformKey "windows-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: server-manager-binary
          path: target/release/ros-server-manager.exe

      - uses: actions/upload-artifact@v4
        with:
          name: server-manager-bundle
          path: deployment/server-manager-app/src-tauri/target/release/bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: server-manager-updater-dist
          path: deployment/server-manager-app/updater-dist/

  build-counterpoint-bridge-gui:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.package_scope == 'full-deployment' }}
    needs: [validate-scripts, pre-retag-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deployment/counterpoint-bridge-gui/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache bridge-gui node_modules
        id: cache-bridge-gui-node-modules
        uses: actions/cache@v4
        with:
          path: deployment/counterpoint-bridge-gui/node_modules
          key: windows-bridge-gui-npm-${{ hashFiles('deployment/counterpoint-bridge-gui/package-lock.json') }}
          restore-keys: windows-bridge-gui-npm-

      - name: Install bridge-gui dependencies
        if: steps.cache-bridge-gui-node-modules.outputs.cache-hit != 'true'
        working-directory: deployment/counterpoint-bridge-gui
        run: npm ci

      - name: Prepare self-contained Counterpoint bridge runtime
        shell: pwsh
        run: |
          npm ci --omit=dev --prefix counterpoint-bridge
          $runtimeDir = "deployment/counterpoint-bridge-gui/src-tauri/bridge-runtime"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          $nodePath = (Get-Command node).Source
          Copy-Item -Path $nodePath -Destination (Join-Path $runtimeDir "node.exe") -Force
          if (-not (Test-Path "counterpoint-bridge/node_modules/mssql")) {
            throw "Counterpoint bridge production dependencies were not installed."
          }
          if (-not (Test-Path (Join-Path $runtimeDir "node.exe"))) {
            throw "Bundled Node runtime was not prepared."
          }

      - name: Cache WiX Toolset
        id: cache-wix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wix314
          key: wix314-binaries-v1

      - name: Setup WiX Toolset
        if: steps.cache-wix.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $wixZip = Join-Path $env:RUNNER_TEMP "wix314.zip"
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $maxRetries = 5
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              Write-Host "Downloading WiX Toolset (Attempt $($retryCount + 1)/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $wixZip -TimeoutSec 60
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Download failed: $_. Retrying in 10 seconds..."
                Start-Sleep -Seconds 10
              } else {
                throw $_
              }
            }
          }
          Write-Host "Extracting WiX Toolset..."
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force

      - name: Set WiX Path
        shell: pwsh
        run: |
          $wixDir = Join-Path $env:RUNNER_TEMP "wix314"
          echo "TAURI_WIX_DIR=$wixDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Counterpoint Bridge GUI binary
        shell: pwsh
        run: |
          cd deployment/counterpoint-bridge-gui
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_COUNTERSYNC_UPDATER_ENDPOINT)) {
            throw "RIVERSIDE_COUNTERSYNC_UPDATER_ENDPOINT is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_PUBLIC_KEY)) {
            throw "RIVERSIDE_UPDATER_PUBLIC_KEY is required"
          }
          $updaterConfig = @{
            bundle = @{
              createUpdaterArtifacts = $true
              useLocalToolsDir = $true
              resources = @(
                "../../../counterpoint-bridge/index.mjs",
                "../../../counterpoint-bridge/package.json",
                "../../../counterpoint-bridge/package-lock.json",
                "../../../counterpoint-bridge/.env.example",
                "../../../counterpoint-bridge/env.example",
                "../../../counterpoint-bridge/dashboard.html",
                "../../../counterpoint-bridge/README.md",
                "../../../counterpoint-bridge/INSTALL_ON_COUNTERPOINT_SERVER.txt",
                "../../../counterpoint-bridge/SCHEMA_PROBE_ALIGNMENT.txt",
                "../../../counterpoint-bridge/DISCOVER_SCHEMA.cmd",
                "../../../counterpoint-bridge/ssms-find-your-tables.sql",
                "../../../counterpoint-bridge/ssms-list-bridge-tables.sql",
                "../../../counterpoint-bridge/node_modules",
                "bridge-runtime/node.exe"
              )
            }
            plugins = @{
              updater = @{
                active = $true
                endpoints = @($env:RIVERSIDE_COUNTERSYNC_UPDATER_ENDPOINT)
                pubkey = $env:RIVERSIDE_UPDATER_PUBLIC_KEY
                windows = @{
                  installMode = "passive"
                }
              }
            }
          } | ConvertTo-Json -Depth 8
          Set-Content -Path "src-tauri/tauri.updater.conf.json" -Value $updaterConfig -NoNewline
          ../../scripts/invoke-tauri-build-with-retry.ps1 -Arguments @("build", "--config", "src-tauri/tauri.updater.conf.json")
          cd ../..
          ./scripts/prepare-tauri-updater-dist.ps1 `
            -PackageJsonPath ".\deployment\counterpoint-bridge-gui\package.json" `
            -TargetRoot ".\target" `
            -OutputDir ".\deployment\counterpoint-bridge-gui\updater-dist" `
            -ManifestName "latest-countersync-bridge-gui.json" `
            -BuildManifestName "counterpoint-bridge-gui-updater-build-manifest.json" `
            -BaseUrl $env:RIVERSIDE_UPDATER_BASE_URL `
            -Notes "Counterpoint Sync Bridge GUI update" `
            -PlatformKey "windows-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: counterpoint-bridge-gui-bundle
          path: target/release/bundle/

      - uses: actions/upload-artifact@v4
        with:
          name: counterpoint-bridge-gui-updater-dist
          path: deployment/counterpoint-bridge-gui/updater-dist/

  publish-main-hub-update:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.package_scope == 'main-hub-update' }}
    needs: [build-register-updater, build-server-binary, require-playwright-green]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Download llama binaries
        uses: actions/download-artifact@v4
        with:
          name: llama-binaries
          path: client/src-tauri/binaries

      - name: Download register bundle
        uses: actions/download-artifact@v4
        with:
          name: register-bundle
          path: target/release/bundle

      - name: Download updater dist
        uses: actions/download-artifact@v4
        with:
          name: updater-dist
          path: client/updater-dist

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: target/release

      - name: Ensure CRLF in deployment scripts
        shell: pwsh
        run: |
          Get-ChildItem -Path "deployment/windows" -Include "*.ps1","*.cmd" -Recurse | ForEach-Object {
            $content = [System.IO.File]::ReadAllText($_.FullName)
            if ($content -notmatch "`r`n" -and $content -match "`n") {
              $fixed = $content -replace "(?!\r)\n", "`r`n"
              [System.IO.File]::WriteAllText($_.FullName, $fixed)
              Write-Host "Converted to CRLF: $($_.Name)"
            }
          }

      - name: Assemble Main Hub update package
        shell: pwsh
        run: |
          $version = (Get-Content "client/package.json" | ConvertFrom-Json).version
          Remove-Item -Path "dist/deployment" -Recurse -Force -ErrorAction SilentlyContinue
          .\deployment\windows\build-deployment-package.ps1 `
            -Version $version `
            -PackageFlavor "MainHub-Update" `
            -ServerBinaryPath ".\target\release\riverside-server.exe" `
            -ClientDistPath ".\client\dist" `
            -RegisterBundlePath ".\target\release\bundle" `
            -ManagerBinaryPath ".\target\release\riverside-deployment-manager.exe" `
            -ServerManagerBinaryPath ".\target\release\ros-server-manager.exe" `
            -AllowMissingManagerBinary `
            -AllowMissingServerManagerBinary
          $mainHubZipPattern = "RiversideOS-v$version-*-MainHub-Update.zip"
          $mainHubZipFiles = @(Get-ChildItem -Path "dist/deployment" -Filter $mainHubZipPattern -ErrorAction SilentlyContinue)
          if ($mainHubZipFiles.Count -ne 1) {
            $found = @(Get-ChildItem -Path "dist/deployment" -Filter "*.zip" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }) -join ", "
            throw "Expected exactly one current Main Hub update ZIP matching $mainHubZipPattern. Found: $found"
          }
          "Main Hub update package: $($mainHubZipFiles[0].Name)" | Add-Content $env:GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: riverside-main-hub-update-package
          path: dist/deployment/RiversideOS-v*-MainHub-Update.zip

      - name: Publish Main Hub update package to GitHub release
        timeout-minutes: 60
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content "client/package.json" | ConvertFrom-Json).version
          $tag = if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG_OVERRIDE)) { "v$version" } else { $env:RELEASE_TAG_OVERRIDE }
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Riverside POS $tag" --notes "Riverside POS Release"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag"
            }
          }

          $release = gh release view $tag --json assets | ConvertFrom-Json
          if ($release -and $release.assets) {
            foreach ($asset in $release.assets) {
              if ($asset.name -like "RiversideOS-v$version-*-MainHub-Update.zip") {
                Write-Host "Deleting obsolete Main Hub update asset: $($asset.name)"
                gh release delete-asset $tag $asset.name --yes
              }
            }
          }

          $mainHubZipPattern = "RiversideOS-v$version-*-MainHub-Update.zip"
          $zipFiles = @(Get-ChildItem -Path "dist/deployment" -Filter $mainHubZipPattern -ErrorAction SilentlyContinue)
          if ($zipFiles.Count -ne 1) {
            $found = @(Get-ChildItem -Path "dist/deployment" -Filter "*.zip" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }) -join ", "
            throw "Expected exactly one current Main Hub update ZIP matching $mainHubZipPattern. Found: $found"
          }
          $zipSizeMb = [Math]::Round($zipFiles[0].Length / 1MB, 1)
          Write-Host "Uploading Main Hub update package: $($zipFiles[0].Name) ($zipSizeMb MB)"
          gh release upload $tag $zipFiles[0].FullName --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload Main Hub update package to release $tag"
          }
          if (Test-Path "client/updater-dist") {
            Write-Host "Uploading Windows app updater assets"
            gh release upload $tag client/updater-dist/* --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload updater assets to release $tag"
            }
          }
          node scripts/verify-updater-release-assets.mjs `
            --repo $env:GITHUB_REPOSITORY `
            --tag $tag `
            --platform windows-x86_64 `
            --manifest latest.json `
            --build-manifest riverside-updater-build-manifest.json

  assemble-package:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.package_scope == 'full-deployment' }}
    needs: [build-register-updater, build-server-binary, build-deployment-manager, build-server-manager, build-counterpoint-bridge-gui, require-playwright-green]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Download llama binaries
        uses: actions/download-artifact@v4
        with:
          name: llama-binaries
          path: client/src-tauri/binaries

      - name: Download register bundle
        uses: actions/download-artifact@v4
        with:
          name: register-bundle
          path: target/release/bundle

      - name: Download updater dist
        uses: actions/download-artifact@v4
        with:
          name: updater-dist
          path: client/updater-dist

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: target/release

      - name: Download deployment manager binary
        uses: actions/download-artifact@v4
        with:
          name: deployment-manager-binary
          path: target/release

      - name: Download deployment manager bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-manager-bundle
          path: target/release/deployment-manager-bundle

      - name: Download server manager binary
        uses: actions/download-artifact@v4
        with:
          name: server-manager-binary
          path: target/release

      - name: Download server manager bundle
        uses: actions/download-artifact@v4
        with:
          name: server-manager-bundle
          path: target/release/server-manager-bundle

      - name: Download bridge GUI bundle
        uses: actions/download-artifact@v4
        with:
          name: counterpoint-bridge-gui-bundle
          path: target/release/bundle

      - name: Download companion updater dists
        uses: actions/download-artifact@v4
        with:
          pattern: "*-updater-dist"
          path: companion-updater-dist
          merge-multiple: true

      - name: Ensure CRLF in deployment scripts
        shell: pwsh
        run: |
          Get-ChildItem -Path "deployment/windows" -Include "*.ps1","*.cmd" -Recurse | ForEach-Object {
            $content = [System.IO.File]::ReadAllText($_.FullName)
            if ($content -notmatch "`r`n" -and $content -match "`n") {
              $fixed = $content -replace "(?!\r)\n", "`r`n"
              [System.IO.File]::WriteAllText($_.FullName, $fixed)
              Write-Host "Converted to CRLF: $($_.Name)"
            }
          }

      - name: Assemble deployment package
        shell: pwsh
        run: |
          $version = (Get-Content "client/package.json" | ConvertFrom-Json).version
          Remove-Item -Path "dist/deployment" -Recurse -Force -ErrorAction SilentlyContinue
          .\deployment\windows\build-deployment-package.ps1 `
            -Version $version `
            -ServerBinaryPath ".\target\release\riverside-server.exe" `
            -ClientDistPath ".\client\dist" `
            -RegisterBundlePath ".\target\release\bundle" `
            -ManagerBinaryPath ".\target\release\riverside-deployment-manager.exe" `
            -ServerManagerBinaryPath ".\target\release\ros-server-manager.exe" `
            -ManagerBundlePath ".\target\release\deployment-manager-bundle" `
            -ServerManagerBundlePath ".\target\release\server-manager-bundle"
          $deploymentZipPattern = "RiversideOS-v$version-*-Windows-Deployment.zip"
          $deploymentZipFiles = @(Get-ChildItem -Path "dist/deployment" -Filter $deploymentZipPattern -ErrorAction SilentlyContinue)
          if ($deploymentZipFiles.Count -ne 1) {
            $found = @(Get-ChildItem -Path "dist/deployment" -Filter "*.zip" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }) -join ", "
            throw "Expected exactly one current Windows deployment ZIP matching $deploymentZipPattern. Found: $found"
          }
          "Deployment package: $($deploymentZipFiles[0].Name)" | Add-Content $env:GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: riverside-windows-deployment-package
          path: dist/deployment/RiversideOS-v*-Windows-Deployment.zip

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-updater-dist
          path: client/updater-dist/

      - name: Publish deployment package to GitHub release
        timeout-minutes: 60
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content "client/package.json" | ConvertFrom-Json).version
          $tag = "v$version"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Riverside POS $tag" --notes "Riverside POS Release"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag"
            }
          }
          
          # Delete duplicate or retired assets that clobber cannot replace because
          # their names differ from the current build artifacts.
          $release = gh release view $tag --json assets | ConvertFrom-Json
          if ($release -and $release.assets) {
            $retiredAssetNames = @(
              "RiversideOS-v0.60.2-install-server-hotfix.zip"
            )
            foreach ($asset in $release.assets) {
              $isOlderDeploymentZip = $asset.name -like "RiversideOS-v$version-*-Windows-Deployment.zip"
              $isRetiredExactAsset = $retiredAssetNames -contains $asset.name
              if ($isOlderDeploymentZip -or $isRetiredExactAsset) {
                Write-Host "Deleting obsolete release asset: $($asset.name)"
                gh release delete-asset $tag $asset.name --yes
              }
            }
          }

          $deploymentZipPattern = "RiversideOS-v$version-*-Windows-Deployment.zip"
          $zipFiles = @(Get-ChildItem -Path "dist/deployment" -Filter $deploymentZipPattern -ErrorAction SilentlyContinue)
          if ($zipFiles.Count -ne 1) {
            $found = @(Get-ChildItem -Path "dist/deployment" -Filter "*.zip" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }) -join ", "
            throw "Expected exactly one current Windows deployment ZIP matching $deploymentZipPattern. Found: $found"
          }
          $zipSizeMb = [Math]::Round($zipFiles[0].Length / 1MB, 1)
          Write-Host "Uploading Windows deployment package: $($zipFiles[0].Name) ($zipSizeMb MB)"
          gh release upload $tag $zipFiles[0].FullName --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload deployment package to release $tag"
          }
          if (Test-Path "client/updater-dist") {
            Write-Host "Uploading Windows app updater assets"
            gh release upload $tag client/updater-dist/* --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload updater assets to release $tag"
            }
          }
          if (Test-Path "companion-updater-dist") {
            Write-Host "Uploading companion updater assets"
            gh release upload $tag companion-updater-dist/* --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload companion updater assets to release $tag"
            }
          }
          $deploymentAppFiles = Get-ChildItem -Path "target/release/deployment-manager-bundle","target/release/server-manager-bundle" -Include "*.msi","*.exe" -Recurse -ErrorAction SilentlyContinue
          if ($deploymentAppFiles) {
            Write-Host "Uploading deployment manager and server manager installers"
            gh release upload $tag $deploymentAppFiles.FullName --clobber
          }
          $bridgeGuiFiles = Get-ChildItem -Path "target/release/bundle" -Include "*.msi","*.exe" -Recurse -ErrorAction SilentlyContinue
          if ($bridgeGuiFiles) {
            Write-Host "Uploading Counterpoint Bridge GUI installers"
            gh release upload $tag $bridgeGuiFiles.FullName --clobber
          }
          node scripts/verify-updater-release-assets.mjs `
            --repo $env:GITHUB_REPOSITORY `
            --tag $tag `
            --platform windows-x86_64 `
            --manifest latest.json `
            --manifest latest-deployment-manager.json `
            --manifest latest-server-manager.json `
            --manifest latest-countersync-bridge-gui.json `
            --build-manifest riverside-updater-build-manifest.json `
            --build-manifest riverside-deployment-manager-updater-build-manifest.json `
            --build-manifest ros-server-manager-updater-build-manifest.json `
            --build-manifest counterpoint-bridge-gui-updater-build-manifest.json
          node scripts/update-release-build-metadata.mjs `
            --repo $env:GITHUB_REPOSITORY `
            --tag $tag `
            --sha $env:GITHUB_SHA `
            --run-url "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
