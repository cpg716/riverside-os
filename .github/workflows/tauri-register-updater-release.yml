name: Tauri register updater release (Windows)

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown in updater prompts"
        required: false
        default: "Riverside POS update"
      release_tag:
        description: "GitHub release tag to publish updater assets to, e.g. v0.50-GOLD. Defaults to v<client package version>."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-updater:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    env:
      RIVERSIDE_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
      RIVERSIDE_UPDATER_PUBLIC_KEY: ${{ vars.RIVERSIDE_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      RIVERSIDE_UPDATER_BASE_URL: https://github.com/${{ github.repository }}/releases/latest/download
      RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      LLAMA_CPP_RELEASE: b8994
      LLAMA_CPP_WIN_CPU_ASSET: llama-b8994-bin-win-cpu-x64.zip
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - name: Install Windows ROSIE sidecar
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP $env:LLAMA_CPP_WIN_CPU_ASSET
          $extractDir = Join-Path $env:RUNNER_TEMP "llama-cpp-win"
          $downloadUrl = "https://github.com/ggml-org/llama.cpp/releases/download/$env:LLAMA_CPP_RELEASE/$env:LLAMA_CPP_WIN_CPU_ASSET"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force

          $binaryDir = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $binaryDir | Out-Null
          Copy-Item -Path (Join-Path $extractDir "llama-server.exe") -Destination "$binaryDir/llama-server-x86_64-pc-windows-msvc.exe" -Force
          Copy-Item -Path (Join-Path $extractDir "*.dll") -Destination $binaryDir -Force

      - name: Smoke ROSIE sidecar package wiring
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          RIVERSIDE_LLAMA_HOST: 127.0.0.1
          RIVERSIDE_LLAMA_PORT: 18080
          RIVERSIDE_LLAMA_EXTRA_ARGS: --reasoning off
          RIVERSIDE_LLAMA_MODEL_PATH: ${{ runner.temp }}\missing-rosie-model.gguf
        run: ./scripts/smoke-rosie-sidecar-package.ps1 -AllowMissingModel

      - name: Build signed updater bundle
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_ENDPOINT)) {
            throw "RIVERSIDE_UPDATER_ENDPOINT is required"
          }
          if ([string]::IsNullOrWhiteSpace($env:RIVERSIDE_UPDATER_PUBLIC_KEY)) {
            throw "RIVERSIDE_UPDATER_PUBLIC_KEY is required"
          }

          $updaterConfig = @{
            bundle = @{
              createUpdaterArtifacts = $true
              resources = @("../dist", "binaries/*.dll")
            }
            plugins = @{
              updater = @{
                active = $true
                endpoints = @($env:RIVERSIDE_UPDATER_ENDPOINT)
                pubkey = $env:RIVERSIDE_UPDATER_PUBLIC_KEY
                windows = @{
                  installMode = "passive"
                }
              }
            }
          } | ConvertTo-Json -Depth 8

          Set-Content -Path "src-tauri/tauri.updater.conf.json" -Value $updaterConfig -NoNewline
          npx tauri build --config src-tauri/tauri.updater.conf.json

      - name: Build updater manifest bundle
        id: updater_meta
        shell: pwsh
        run: |
          $targetRoot = "src-tauri/target"
          $sig = Get-ChildItem -Path $targetRoot -Recurse -Filter *.sig | Select-Object -First 1
          if ($null -eq $sig) {
            throw "No updater signature file (*.sig) found. Ensure TAURI_SIGNING_PRIVATE_KEY is configured."
          }

          $artifactPath = [System.IO.Path]::GetFullPath(($sig.FullName.Substring(0, $sig.FullName.Length - 4)))
          if (-not (Test-Path $artifactPath)) {
            throw "Could not find updater artifact paired with signature: $artifactPath"
          }

          $pkg = Get-Content "package.json" | ConvertFrom-Json
          $version = $pkg.version
          $requestedTag = if ($null -eq $env:RELEASE_TAG) { "" } else { $env:RELEASE_TAG.Trim() }
          $tag = if ([string]::IsNullOrWhiteSpace($requestedTag)) { "v$version" } else { $requestedTag }
          if ($tag -notmatch '^v.+') {
            throw "release_tag must include the leading v, for example v0.50-GOLD"
          }
          $gitShort = $env:GITHUB_SHA.Substring(0, 8)
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $artifactName = [System.IO.Path]::GetFileName($artifactPath)
          $releaseAssetName = $artifactName -replace ' ', '.'
          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $notes = if ([string]::IsNullOrWhiteSpace($env:RELEASE_NOTES)) { "Riverside POS update" } else { $env:RELEASE_NOTES }

          $manifest = @{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "$($env:RIVERSIDE_UPDATER_BASE_URL.TrimEnd('/'))/$releaseAssetName"
              }
            }
          } | ConvertTo-Json -Depth 6

          New-Item -ItemType Directory -Force -Path updater-dist | Out-Null
          Copy-Item -Path $artifactPath -Destination "updater-dist/$releaseAssetName" -Force
          Copy-Item -Path $sig.FullName -Destination "updater-dist/$($sig.Name)" -Force
          Set-Content -Path "updater-dist/latest.json" -Value $manifest -NoNewline
          @{
            version = $version
            sourceGitSha = $env:GITHUB_SHA
            sourceGitShort = $gitShort
            asset = $releaseAssetName
            builtAt = $pubDate
          } | ConvertTo-Json -Depth 4 | Set-Content -Path "updater-dist/riverside-updater-build-manifest.json" -NoNewline
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v6
        with:
          name: tauri-windows-updater-dist
          path: client/updater-dist/

      - name: Publish updater assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.updater_meta.outputs.tag }}
        run: |
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG --title "Riverside POS $env:TAG" --notes "$env:RELEASE_NOTES"
          }
          gh release upload $env:TAG updater-dist/* --clobber
