name: Lint Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-scope:
    name: Classify CI Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      full_stack: ${{ steps.scope.outputs.full_stack }}
      companion_directories: ${{ steps.scope.outputs.companion_directories }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Classify changed dependency scope
        id: scope
        run: |
          node scripts/classify-ci-scope.mjs \
            --event "${{ github.event_name }}" \
            --actor "${{ github.actor }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --github-output "$GITHUB_OUTPUT"

  client-lint:
    name: Client (React) Lint
    needs: ci-scope
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Validate isolated companion dependency changes
        if: needs.ci-scope.outputs.full_stack != 'true'
        working-directory: ${{ github.workspace }}
        env:
          COMPANION_DIRECTORIES: ${{ needs.ci-scope.outputs.companion_directories }}
        run: node scripts/validate-companion-dependencies.mjs --directories-json "$COMPANION_DIRECTORIES"

      - name: Install dependencies
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: npm ci --legacy-peer-deps

      - name: Regenerate help artifacts
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: npm run generate:help

      - name: Verify generated help artifacts are current
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: git diff --exit-code -- src/lib/help/help-manifest.generated.ts ../server/src/logic/help_corpus_manuals.generated.rs

      - name: Run ESLint
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: npm run lint

      - name: Run TypeScript Check
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: npm run typecheck

  server-lint:
    name: Server (Rust) Clippy
    needs: ci-scope
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - name: Skip core server lint for isolated companion dependency changes
        if: needs.ci-scope.outputs.full_stack != 'true'
        run: echo "Core server files are unchanged; companion validation runs in Client (React) Lint."

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        if: needs.ci-scope.outputs.full_stack == 'true'
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        if: needs.ci-scope.outputs.full_stack == 'true'
      - name: Check Formatting
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: cargo fmt --check

      - name: Run Clippy
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: cargo clippy -- -D warnings

      # Security audit is handled by the weekly security-audit.yml workflow

  tauri-lint:
    name: Tauri (Rust) Clippy
    needs: ci-scope
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: client/src-tauri
    steps:
      - name: Skip core Tauri lint for isolated companion dependency changes
        if: needs.ci-scope.outputs.full_stack != 'true'
        run: echo "Core Tauri files are unchanged; companion validation runs in Client (React) Lint."

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - name: Install Linux dependencies
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        if: needs.ci-scope.outputs.full_stack == 'true'
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        if: needs.ci-scope.outputs.full_stack == 'true'
      - name: Check Formatting
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: cargo fmt --check

      - name: Ensure bundled frontend resource path exists
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: mkdir -p ../dist

      - name: Run Clippy
        if: needs.ci-scope.outputs.full_stack == 'true'
        run: cargo clippy -- -D warnings
