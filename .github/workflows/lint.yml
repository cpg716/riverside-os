name: Lint Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server-migrations:
    name: Server Migrations Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: riverside_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d riverside_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/riverside_os
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply SQL migrations on a fresh database
        run: ./scripts/apply-migrations-psql.sh

      - name: Verify latest migration ledger row exists
        run: |
          psql "$DATABASE_URL" -tAc \
            "SELECT EXISTS(SELECT 1 FROM ros_schema_migrations WHERE version = '147_counterpoint_sync_record_counting.sql');" \
            | grep -qx 't'

  client-lint:
    name: Client (React) Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run typecheck

  server-lint:
    name: Server (Rust) Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  tauri-lint:
    name: Tauri (Rust) Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
