name: Lint Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-lint:
    name: Client (React) Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate help artifacts
        run: npm run generate:help

      - name: Verify generated help artifacts are current
        run: git diff --exit-code -- src/lib/help/help-manifest.generated.ts ../server/src/logic/help_corpus_manuals.generated.rs

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run typecheck

  server-lint:
    name: Server (Rust) Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      # Security audit is handled by the weekly security-audit.yml workflow

  tauri-lint:
    name: Tauri (Rust) Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: client/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check Formatting
        run: cargo fmt --check

      - name: Ensure bundled frontend resource path exists
        run: mkdir -p ../dist

      - name: Run Clippy
        run: cargo clippy -- -D warnings
