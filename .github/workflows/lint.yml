name: Lint Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  client-lint:
    name: Client (React) Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Regenerate help artifacts
        run: npm run generate:help

      - name: Verify generated help artifacts are current
        run: git diff --exit-code -- src/lib/help/help-manifest.generated.ts ../server/src/logic/help_corpus_manuals.generated.rs

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run typecheck

  server-lint:
    name: Server (Rust) Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  counterpoint-bridge-package:
    name: Counterpoint Bridge Package Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate package scripts
        run: |
          bash -n scripts/package-counterpoint-bridge.sh
          bash -n scripts/smoke-counterpoint-bridge-package.sh

      - name: Smoke package contents
        run: ./scripts/smoke-counterpoint-bridge-package.sh

  tauri-lint:
    name: Tauri (Rust) Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/src-tauri
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Check Formatting
        run: cargo fmt --check

      - name: Ensure bundled frontend resource path exists
        run: mkdir -p ../dist

      - name: Run Clippy
        run: cargo clippy -- -D warnings
