name: macOS ROS Dev Center Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.90.0)"
        required: true
        default: "v0.90.0"
      release_notes:
        description: "Release notes"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: riverside-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  require-playwright-green:
    name: Require Playwright E2E green
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify release tag targets this commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-release-tag-target.mjs --tag "${{ github.event.inputs.release_tag || github.ref_name }}"
      - name: Wait for same-commit Playwright E2E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/require-playwright-success.mjs --sha "${{ github.sha }}"

  pre-retag-gate:
    name: Pre-retag release gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.91"
          components: rustfmt

      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: "macos-pre-retag"

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Run pre-retag gate
        run: npm run check:pre-retag

  build-macos:
    needs: [pre-retag-gate, require-playwright-green]
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RIVERSIDE_BUILD_SHA: ${{ github.sha }}
      RIVERSIDE_ROS_DEV_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-ros-dev-center-macos.json
      RIVERSIDE_UPDATER_PUBLIC_KEY: ${{ vars.RIVERSIDE_UPDATER_PUBLIC_KEY }}
      RIVERSIDE_UPDATER_BASE_URL: https://github.com/${{ github.repository }}/releases/latest/download
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ros-dev/package-lock.json

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.91"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: "macos-ros-dev"

      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - name: Install ROS Dev Center dependencies
        working-directory: ros-dev
        run: npm ci

      - name: Check Riverside version parity
        working-directory: ${{ github.workspace }}
        run: node scripts/check-version-parity.mjs

      - name: Check go-live blocker gates
        working-directory: ${{ github.workspace }}
        run: node scripts/check-go-live-blockers.mjs

      - name: Build ROS Dev Center (macOS universal)
        working-directory: ros-dev
        shell: bash
        env:
          CI: true
        run: |
          if [ -z "${RIVERSIDE_ROS_DEV_UPDATER_ENDPOINT}" ]; then
            echo "RIVERSIDE_ROS_DEV_UPDATER_ENDPOINT is required" >&2
            exit 1
          fi
          if [ -z "${RIVERSIDE_UPDATER_PUBLIC_KEY}" ]; then
            echo "RIVERSIDE_UPDATER_PUBLIC_KEY is required" >&2
            exit 1
          fi
          cat > src-tauri/tauri.updater.conf.json <<EOF
          {
            "bundle": {
              "createUpdaterArtifacts": true
            },
            "plugins": {
              "updater": {
                "active": true,
                "endpoints": ["${RIVERSIDE_ROS_DEV_UPDATER_ENDPOINT}"],
                "pubkey": "${RIVERSIDE_UPDATER_PUBLIC_KEY}"
              }
            }
          }
          EOF
          npm run tauri build -- --target universal-apple-darwin --config src-tauri/tauri.updater.conf.json

      - name: Verify Apple signing and notarization
        if: vars.RIVERSIDE_REQUIRE_APPLE_SIGNING == 'true'
        shell: bash
        run: |
          app=$(find target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$app" ]; then
            echo "No macOS app bundle was found for signing verification." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
            notes="${{ github.event.inputs.release_notes }}"
          else
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            notes="ROS Dev Center v$version — macOS Apple Silicon / Intel universal build."
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "${{ steps.meta.outputs.notes }}"
          pwsh ./scripts/prepare-tauri-updater-dist.ps1 \
            -PackageJsonPath "./ros-dev/package.json" \
            -TargetRoot "./target/universal-apple-darwin" \
            -OutputDir "./ros-dev/updater-dist" \
            -ManifestName "latest-ros-dev-center-macos.json" \
            -BuildManifestName "ros-dev-center-updater-build-manifest.json" \
            -BaseUrl "$RIVERSIDE_UPDATER_BASE_URL" \
            -Notes "ROS Dev Center macOS update"
          dmg=$(ls target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          app=$(ls target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
          if [ -n "$dmg" ]; then
            echo "Uploading DMG: $dmg"
            gh release upload "$tag" "$dmg" --clobber
          fi
          if [ -n "$app" ]; then
            echo "Uploading App: $app"
            gh release upload "$tag" "$app" --clobber
          fi
          gh release upload "$tag" ros-dev/updater-dist/* --clobber
          node scripts/verify-updater-release-assets.mjs \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --manifest latest-ros-dev-center-macos.json \
            --build-manifest ros-dev-center-updater-build-manifest.json
          node scripts/update-release-build-metadata.mjs \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --sha "$GITHUB_SHA" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
