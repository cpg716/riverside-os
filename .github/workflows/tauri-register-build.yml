# Manual Windows installer build for the Tauri register desktop.
# Code signing: add your certificate step before `tauri build` if SmartScreen requires it.
name: Tauri register (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri bundle
        run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-bundle
          path: client/src-tauri/target/release/bundle/
