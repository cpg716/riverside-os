# Manual Windows installer build for the Tauri desktop application.
# Code signing: add your certificate step before `tauri build` if SmartScreen requires it.
name: Tauri Desktop App (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      RIVERSIDE_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
      RIVERSIDE_UPDATER_PUBLIC_KEY: ${{ vars.RIVERSIDE_UPDATER_PUBLIC_KEY }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Cache client node_modules
        id: cache-client-node-modules
        uses: actions/cache@v5
        with:
          path: client/node_modules
          key: windows-client-npm-${{ hashFiles('client/package-lock.json') }}
          restore-keys: windows-client-npm-

      - name: Install client dependencies
        if: steps.cache-client-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2

      - name: Build Tauri bundle
        run: npm run tauri:build

      - uses: actions/upload-artifact@v6
        with:
          name: tauri-windows-bundle
          path: target/release/bundle/
