version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "02:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    groups:
      routine-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      major-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major"]
      security-updates:
        applies-to: security-updates
        patterns: ["*"]

