[advisories]
ignore = [
    # lexical-core soundness issues — pulled via imap/imap-proto/nom (email integration)
    "RUSTSEC-2023-0086",
    # rsa Marvin Attack — pulled via sqlx-mysql (DB driver; no fixed upgrade available)
